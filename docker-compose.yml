name: synapxia
version: "3.9"
services:
  db:
    container_name: synapxia-db
    image: postgres:18
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_SCHEMA}
    ports:
      - "5432:5432"
    networks:
      - synapxia-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 30s
      timeout: 5s
      retries: 5

  pgadmin:
    container_name: synapxia-pgadmin
    image: dpage/pgadmin4:9.11
    ports:
      - "8080:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD}
    depends_on:
      - db
    networks:
      - synapxia-network

  api:
    container_name: synapxia-api
    build:
      context: ./api
      dockerfile: ./Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./api:/app
    working_dir: /app
    ports:
      - 8000:80
    networks:
      - synapxia-network
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_SCHEMA}
      - APP_ENV=development
      - LOG_LEVEL=debug
      - DB_HOST=${DB_HOST}
      - DB_SCHEMA=${DB_SCHEMA}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=${DB_PORT}
      - UV_APP=app.main:app
    command: uv run fastapi dev --host 0.0.0.0 --port 80

  ui:
    container_name: synapxia-ui
    build:
      context: ./ui
      target: development
      dockerfile: ./Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - 4321:4321
    networks:
      - synapxia-network
    volumes:
      - ./ui:/app
      - /app/node_modules
    working_dir: /app
    entrypoint: bun run dev
    environment:
      - NODE_ENV=development
      - API_PATH=http://synapxia-api:8000

networks:
  synapxia-network:
    driver: bridge