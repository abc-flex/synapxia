# Alembic Configuration
# This file contains configuration for Alembic database migrations.
# For more info, see https://alembic.sqlalchemy.org/

[alembic]
# path to migration scripts
script_location = migrations

# template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
prepend_sys_path = .

# timezone to use when rendering the date
# within the migration file as well as the filename.
# string value is passed to zoneinfo.ZoneInfo()
# leave blank for localtime
# timezone =

# max length of characters to apply to the
# "slug" field:
# set to -1 to disable, None to use 40
# truncate_slug_len = 40

# set to 'true' to run the environment under
# the "in process" interpreter, as opposed to
# so the "alembic" command does not need to
# be installed into the environemnt
# in_process = false

sqlalchemy.url = driver://user:password@localhost/dbname

[loggers]
keys = root,sqlalchemy.pool,sqlalchemy.dialects

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy.pool]
level = WARN
handlers =
qualname = sqlalchemy.pool

[logger_sqlalchemy.dialects]
level = WARN
handlers =
qualname = sqlalchemy.dialects

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
