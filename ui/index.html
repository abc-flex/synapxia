<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SinapxIA - Assignments Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="bg-slate-50 text-slate-900 flex flex-col min-h-screen">
    <!-- Header -->
    <header class="bg-white border-b border-slate-200 shadow-sm">
      <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between gap-6">
        <div>
          <h1 class="text-3xl font-bold text-slate-900">SinapxIA</h1>
          <p class="text-sm text-slate-500" data-i18n="header.subtitle">
            System for Insight, Adoption, Practice & eXpansion through Intelligent Agents
          </p>
        </div>
        <select
          id="languageSelector"
          class="px-3 py-2 bg-white border border-slate-200 rounded-lg text-slate-700 text-sm cursor-pointer shadow-sm hover:border-indigo-400 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition"
        >
          <option value="en" class="text-gray-900">English</option>
          <option value="es" class="text-gray-900">Español</option>
        </select>
      </div>
    </header>

    <div class="flex flex-1 max-w-7xl w-full mx-auto">
      <!-- Sidebar -->
      <aside class="w-64 bg-white border-r border-slate-200 p-6 shadow-sm">
        <nav class="space-y-1">
          <ul>
            <li class="nav-item">
              <a
                href="#"
                class="nav-link active block px-4 py-3 rounded-lg bg-indigo-50 text-indigo-700 font-semibold transition border border-indigo-100"
                data-i18n="sidebar.dashboard"
                >Dashboard</a
              >
            </li>
            <li class="nav-item">
              <a
                href="#"
                class="nav-link block px-4 py-3 rounded-lg text-slate-700 hover:bg-indigo-50 hover:text-indigo-700 transition"
                data-i18n="sidebar.assignments"
                >Assignments</a
              >
            </li>
            <li class="nav-item">
              <a
                href="#"
                class="nav-link block px-4 py-3 rounded-lg text-slate-700 hover:bg-indigo-50 hover:text-indigo-700 transition"
                data-i18n="sidebar.reports"
                >Reports</a
              >
            </li>
            <li class="nav-item">
              <a
                href="#"
                class="nav-link block px-4 py-3 rounded-lg text-slate-700 hover:bg-indigo-50 hover:text-indigo-700 transition"
                data-i18n="sidebar.settings"
                >Settings</a
              >
            </li>
          </ul>
        </nav>
      </aside>

      <!-- Main Content -->
      <main class="flex-1 p-8 overflow-x-auto bg-slate-50">
        <div
          class="flex flex-col gap-4 md:flex-row md:justify-between md:items-center mb-8"
        >
          <h2
            class="text-3xl font-bold text-slate-900"
            data-i18n="dashboard.title"
          >
            Assignments Dashboard
          </h2>
          <div class="flex flex-col gap-3 md:flex-row md:items-center md:gap-4">
            <div class="flex flex-col gap-2 md:flex-row md:items-center">
              <label
                for="dimensionSelect"
                class="font-semibold text-slate-700"
                data-i18n="dashboard.selectDimension"
                >Select Dimension:</label
              >
              <select
                id="dimensionSelect"
                class="px-4 py-2 border border-slate-200 rounded-lg bg-white text-slate-900 text-base cursor-pointer shadow-sm focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition min-w-[240px]"
              >
                <option
                  value="genAIDevs"
                  selected
                  data-i18n="dimensions.genAIDevs"
                >
                  GenAI Adoption for Devs
                </option>
                <option value="genAIQA" data-i18n="dimensions.genAIQA">
                  GenAI Adoption for QA
                </option>
              </select>
            </div>
          </div>
        </div>

        <div
          id="dashboardGrid"
          class="bg-white rounded-2xl p-6 shadow-lg border border-slate-200 overflow-x-auto"
        >
          <!-- Grid will be dynamically generated -->
        </div>
      </main>
    </div>

    <!-- Footer -->
    <footer
      class="bg-white border-t border-slate-200 py-6 px-6 text-center text-slate-500 text-sm"
    >
      <p data-i18n="footer.copyright">
        &copy; 2025 SinapxIA. All rights reserved.
      </p>
      <!-- Hidden export action to download current data as JSON -->
      <button
        id="exportDataBtn"
        class="px-2 py-1 mt-[100px] bg-gray-300 text-gray-800 text-sm font-semibold rounded-md border border-gray-300 hover:bg-gray-300 transition"
        aria-hidden="true"
      >
        <svg
          class="w-4 h-4 text-gray-800 dark:text-white"
          aria-hidden="true"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 16 18"
        >
          <path
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M8 1v11m0 0 4-4m-4 4L4 8m11 4v3a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2v-3"
          />
        </svg>
      </button>
    </footer>

    <!-- Modal for Employee Details -->
    <div
      id="employeeModal"
      class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center animate-fadeIn"
    >
      <div
        class="bg-white rounded-2xl p-8 w-[700px] max-w-5xl shadow-2xl animate-slideDown border border-slate-200"
      >
        <div class="flex justify-between items-start mb-6">
          <h3
            id="modalEmployeeName"
            class="text-2xl font-bold text-gray-900"
          ></h3>
          <button
            class="close text-gray-400 hover:text-gray-600 text-2xl transition"
          >
            &times;
          </button>
        </div>

        <div class="space-y-4">
          <div>
            <label
              class="block text-sm font-semibold text-gray-600 mb-1"
              data-i18n="modal.email"
              >Email:</label
            >
            <span id="modalEmployeeEmail" class="text-slate-900"></span>
          </div>
          <div class="flex flex-col gap-4 md:flex-row md:gap-4">
            <div class="flex-1">
              <label
                class="block text-sm font-semibold text-gray-600 mb-1"
                data-i18n="modal.role"
                >Role:</label
              >
              <span id="modalEmployeeRole" class="text-slate-900"></span>
            </div>
            <div class="flex-1">
              <label
                class="block text-sm font-semibold text-gray-600 mb-1"
                data-i18n="modal.team"
                >Team:</label
              >
              <span id="modalEmployeeTeam" class="text-slate-900"></span>
            </div>
            <div class="flex-1">
              <label
                class="block text-sm font-semibold text-gray-600 mb-1"
                data-i18n="modal.date"
                >Date:</label
              >
              <span id="modalEmployeeDate" class="text-slate-900"></span>
            </div>
          </div>
          <div>
            <label
              for="modalMetricSelect"
              class="block text-sm font-semibold text-gray-600 mb-2"
              data-i18n="modal.currentMetric"
              >Current Metric:</label
            >
            <select
              id="modalMetricSelect"
              class="w-full px-3 py-2 border border-slate-200 rounded-lg bg-white text-slate-900 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition shadow-sm"
            >
              <option value="NO_USAGE">No Usage</option>
              <option value="LOW">Low</option>
              <option value="MODERATE">Moderate</option>
              <option value="HIGH">High</option>
              <option value="VERY_HIGH">Very High</option>
            </select>
          </div>
          <div>
            <label
              class="block text-sm font-semibold text-gray-600 mb-1"
              data-i18n="modal.observation"
              >Observation:</label
            >
            <textarea
              id="modalEmployeeObservation"
              class="w-full px-3 py-2 border border-slate-200 rounded-lg bg-white text-slate-900 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition min-h-[120px] shadow-sm"
            ></textarea>
          </div>
        </div>

        <div class="flex gap-3 mt-8">
          <button
            id="saveMetricBtn"
            class="flex-1 px-5 py-3 bg-blue-50 text-indigo-600 font-semibold rounded-2xl border border-blue-200 shadow-sm hover:border-indigo-300 hover:text-indigo-700 transition transform hover:-translate-y-0.5"
            data-i18n="modal.saveMetric"
          >
            Save Metric
          </button>
          <button
            id="addEntryBtn"
            class=" hidden flex-1 px-4 py-2 bg-gray-100 text-gray-900 font-semibold rounded-lg border border-gray-300 hover:bg-gray-200 transition transform hover:-translate-y-0.5"
            data-i18n="modal.addEntry"
          >
            Add New Entry
          </button>
        </div>
      </div>
    </div>

    <script src="js/i18n.js"></script>
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
