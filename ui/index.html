<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SinapxIA - Assignments Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="bg-gray-100 flex flex-col min-h-screen">
    <!-- Header -->
    <header
      class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white shadow-lg"
    >
      <div class="max-w-7xl mx-auto px-6 py-6">
        <h1 class="text-3xl font-bold mb-1">SinapxIA</h1>
        <p class="text-sm opacity-90 mb-4" data-i18n="header.subtitle">
          System for Insight, Adoption, Practice & eXpansion through Intelligent
          Agents
        </p>
        <div class="flex justify-end">
          <select
            id="languageSelector"
            class="px-3 py-2 bg-white/10 border border-white/30 rounded-md text-white text-sm cursor-pointer hover:bg-white/20 transition"
          >
            <option value="en" class="text-gray-900">English</option>
            <option value="es" class="text-gray-900">Español</option>
          </select>
        </div>
      </div>
    </header>

    <div class="flex flex-1 max-w-7xl w-full mx-auto">
      <!-- Sidebar -->
      <aside class="w-64 bg-white border-r border-gray-200 p-6">
        <nav class="space-y-1">
          <ul>
            <li class="nav-item">
              <a
                href="#"
                class="nav-link active block px-4 py-3 rounded-lg bg-indigo-600 text-white font-semibold transition"
                data-i18n="sidebar.dashboard"
                >Dashboard</a
              >
            </li>
            <li class="nav-item">
              <a
                href="#"
                class="nav-link block px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100 hover:text-indigo-600 transition"
                data-i18n="sidebar.assignments"
                >Assignments</a
              >
            </li>
            <li class="nav-item">
              <a
                href="#"
                class="nav-link block px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100 hover:text-indigo-600 transition"
                data-i18n="sidebar.reports"
                >Reports</a
              >
            </li>
            <li class="nav-item">
              <a
                href="#"
                class="nav-link block px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100 hover:text-indigo-600 transition"
                data-i18n="sidebar.settings"
                >Settings</a
              >
            </li>
          </ul>
        </nav>
      </aside>

      <!-- Main Content -->
      <main class="flex-1 p-8 overflow-x-auto">
        <div
          class="flex flex-col gap-4 md:flex-row md:justify-between md:items-center mb-8"
        >
          <h2
            class="text-3xl font-bold text-gray-900"
            data-i18n="dashboard.title"
          >
            Assignments Dashboard
          </h2>
          <div class="flex flex-col gap-3 md:flex-row md:items-center md:gap-4">
            <div class="flex flex-col gap-2 md:flex-row md:items-center">
              <label
                for="dimensionSelect"
                class="font-semibold text-gray-700"
                data-i18n="dashboard.selectDimension"
                >Select Dimension:</label
              >
              <select
                id="dimensionSelect"
                class="px-4 py-2 border border-gray-300 rounded-lg bg-white text-gray-900 text-base cursor-pointer focus:outline-none focus:border-indigo-600 focus:ring-2 focus:ring-indigo-200 transition min-w-[200px]"
              >
                <option
                  value="aiAdoption"
                  selected
                  data-i18n="dimensions.aiAdoption"
                >
                  AI Adoption
                </option>
                <option value="vacation" data-i18n="dimensions.vacation">
                  Vacation
                </option>
                <option
                  value="englishLevel"
                  data-i18n="dimensions.englishLevel"
                >
                  English Level
                </option>
              </select>
            </div>
          </div>
        </div>

        <div
          id="dashboardGrid"
          class="bg-white rounded-2xl p-6 shadow-md overflow-x-auto"
        >
          <!-- Grid will be dynamically generated -->
        </div>
      </main>
    </div>

    <!-- Footer -->
    <footer
      class="bg-white border-t border-gray-200 py-6 px-6 text-center text-gray-600 text-sm"
    >
      <p data-i18n="footer.copyright">
        &copy; 2025 SinapxIA. All rights reserved.
      </p>
      <!-- Hidden export action to download current data as JSON -->
      <button
        id="exportDataBtn"
        class="px-2 py-1 mt-[100px] bg-gray-300 text-gray-800 text-sm font-semibold rounded-md border border-gray-300 hover:bg-gray-300 transition"
        aria-hidden="true"
      >
        <svg
          class="w-4 h-4 text-gray-800 dark:text-white"
          aria-hidden="true"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 16 18"
        >
          <path
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M8 1v11m0 0 4-4m-4 4L4 8m11 4v3a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2v-3"
          />
        </svg>
      </button>
    </footer>

    <!-- Modal for Employee Details -->
    <div
      id="employeeModal"
      class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center animate-fadeIn"
    >
      <div
        class="bg-white rounded-2xl p-8 w-96 max-w-4xl shadow-2xl animate-slideDown"
      >
        <div class="flex justify-between items-start mb-6">
          <h3
            id="modalEmployeeName"
            class="text-2xl font-bold text-gray-900"
          ></h3>
          <button
            class="close text-gray-400 hover:text-gray-600 text-2xl transition"
          >
            &times;
          </button>
        </div>

        <div class="space-y-4">
          <div>
            <label
              class="block text-sm font-semibold text-gray-600 mb-1"
              data-i18n="modal.email"
              >Email:</label
            >
            <span id="modalEmployeeEmail" class="text-gray-900"></span>
          </div>
          <div>
            <label
              class="block text-sm font-semibold text-gray-600 mb-1"
              data-i18n="modal.role"
              >Role:</label
            >
            <span id="modalEmployeeRole" class="text-gray-900"></span>
          </div>
          <div>
            <label
              class="block text-sm font-semibold text-gray-600 mb-1"
              data-i18n="modal.team"
              >Team:</label
            >
            <span id="modalEmployeeTeam" class="text-gray-900"></span>
          </div>
          <div>
            <label
              class="block text-sm font-semibold text-gray-600 mb-1"
              data-i18n="modal.date"
              >Date:</label
            >
            <span id="modalEmployeeDate" class="text-gray-900"></span>
          </div>
          <div>
            <label
              class="block text-sm font-semibold text-gray-600 mb-1"
              data-i18n="modal.observation"
              >Observation:</label
            >
            <p
              id="modalEmployeeObservation"
              class="text-gray-900 leading-relaxed"
            ></p>
          </div>
          <div>
            <label
              for="modalMetricSelect"
              class="block text-sm font-semibold text-gray-600 mb-2"
              data-i18n="modal.currentMetric"
              >Current Metric:</label
            >
            <select
              id="modalMetricSelect"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg bg-white text-gray-900 focus:outline-none focus:border-indigo-600 focus:ring-2 focus:ring-indigo-200 transition"
            >
              <option value="Alto" data-i18n="metrics.high">High</option>
              <option value="Medio" data-i18n="metrics.medium">Medium</option>
              <option value="Bajo" data-i18n="metrics.low">Low</option>
            </select>
          </div>
        </div>

        <div class="flex gap-3 mt-8">
          <button
            id="saveMetricBtn"
            class="flex-1 px-4 py-2 bg-indigo-600 text-white font-semibold rounded-lg hover:bg-indigo-700 transition transform hover:-translate-y-0.5 shadow-md"
            data-i18n="modal.saveMetric"
          >
            Save Metric
          </button>
          <button
            id="addEntryBtn"
            class="flex-1 px-4 py-2 bg-gray-100 text-gray-900 font-semibold rounded-lg border border-gray-300 hover:bg-gray-200 transition transform hover:-translate-y-0.5"
            data-i18n="modal.addEntry"
          >
            Add New Entry
          </button>
        </div>
      </div>
    </div>

    <script src="js/i18n.js"></script>
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
