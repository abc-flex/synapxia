<!doctype html>
<html lang="en" class="bg-gray-100">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SynapxIA — Create / Edit modal</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-8 text-gray-900">
  <div class="flex flex-wrap items-start gap-10">

    <!-- CREATE (desktop 680px) -->
    <div>
      <div class="mb-2 inline-flex rounded-full bg-indigo-50 px-3 py-1 text-xs font-semibold text-indigo-700">Create · desktop</div>
      <div class="rounded-2xl border border-gray-200 bg-white shadow-2xl">
        <form class="flex w-[680px] max-w-full flex-col">
          <div class="flex items-center justify-between border-b border-gray-100 px-5 py-4">
            <h2 class="text-lg font-semibold text-gray-900">New Asset</h2>
            <button type="button" class="p-1 text-gray-400 hover:text-gray-600">✕</button>
          </div>
          <div class="flex-1 space-y-4 px-5 py-4">
            <div class="flex flex-col gap-1 sm:flex-row sm:items-start sm:gap-4">
              <div class="sm:w-32 sm:pt-2"><label class="text-sm font-medium text-gray-700"><span class="text-red-500">*</span> Name</label></div>
              <div class="flex-1"><input type="text" placeholder="Asset name" class="h-11 w-full rounded-lg border border-gray-200 bg-white px-3 text-sm shadow-inner focus:border-indigo-300 focus:ring-2 focus:ring-indigo-100 focus:outline-none" /></div>
            </div>
            <div class="flex flex-col gap-1 sm:flex-row sm:items-start sm:gap-4">
              <div class="sm:w-32 sm:pt-2"><label class="text-sm font-medium text-gray-700"><span class="text-red-500">*</span> Category</label></div>
              <div class="flex-1"><select class="h-11 w-full rounded-lg border border-gray-200 bg-white px-3 text-sm text-gray-500 shadow-inner"><option>— select —</option></select></div>
            </div>
            <div class="flex flex-col gap-1 sm:flex-row sm:items-start sm:gap-4">
              <div class="sm:w-32 sm:pt-2"><label class="text-sm font-medium text-gray-700"><span class="text-red-500">*</span> Status</label></div>
              <div class="flex-1"><select class="h-11 w-full rounded-lg border border-gray-200 bg-white px-3 text-sm text-gray-500 shadow-inner"><option>— select —</option></select></div>
            </div>
            <div class="flex flex-col gap-1 sm:flex-row sm:items-start sm:gap-4">
              <div class="sm:w-32 sm:pt-2"><label class="text-sm font-medium text-gray-700">Reference</label></div>
              <div class="flex-1"><input type="text" placeholder="e.g. REPO-204" class="h-11 w-full rounded-lg border border-gray-200 bg-white px-3 text-sm shadow-inner" /></div>
            </div>
            <div class="flex flex-col gap-1 sm:flex-row sm:items-start sm:gap-4">
              <div class="sm:w-32 sm:pt-2"><label class="text-sm font-medium text-gray-700">Description</label></div>
              <div class="flex-1"><textarea rows="3" placeholder="Short description" class="w-full rounded-lg border border-gray-200 bg-white px-3 py-2 text-sm shadow-inner"></textarea></div>
            </div>
            <div class="flex items-center gap-3 sm:gap-4">
              <div class="hidden sm:block sm:w-32"></div>
              <div class="flex flex-1 items-center gap-2">
                <input type="checkbox" checked class="h-4 w-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500" />
                <label class="text-sm font-medium text-gray-700">Active</label>
              </div>
            </div>
          </div>
          <div class="flex items-center justify-end gap-3 border-t border-gray-100 px-5 py-3">
            <button type="button" class="rounded-lg px-4 py-2 text-sm font-semibold text-gray-600 hover:bg-gray-100">Cancel</button>
            <button type="button" class="rounded-lg bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-700">Save</button>
          </div>
        </form>
      </div>
    </div>

    <!-- EDIT (desktop 680px, prefilled) -->
    <div>
      <div class="mb-2 inline-flex rounded-full bg-indigo-50 px-3 py-1 text-xs font-semibold text-indigo-700">Edit · desktop</div>
      <div class="rounded-2xl border border-gray-200 bg-white shadow-2xl">
        <form class="flex w-[680px] max-w-full flex-col">
          <div class="flex items-center justify-between border-b border-gray-100 px-5 py-4">
            <h2 class="text-lg font-semibold text-gray-900">Edit Asset</h2>
            <button type="button" class="p-1 text-gray-400 hover:text-gray-600">✕</button>
          </div>
          <div class="flex-1 space-y-4 px-5 py-4">
            <div class="flex flex-col gap-1 sm:flex-row sm:items-start sm:gap-4">
              <div class="sm:w-32 sm:pt-2"><label class="text-sm font-medium text-gray-700">Reference <span class="ml-2 text-xs text-gray-500">(readonly)</span></label></div>
              <div class="flex-1"><input type="text" value="REPO-204" readonly class="h-11 w-full rounded-lg border border-gray-200 bg-white px-3 text-sm shadow-inner opacity-60" /></div>
            </div>
            <div class="flex flex-col gap-1 sm:flex-row sm:items-start sm:gap-4">
              <div class="sm:w-32 sm:pt-2"><label class="text-sm font-medium text-gray-700"><span class="text-red-500">*</span> Name</label></div>
              <div class="flex-1"><input type="text" value="Customer Churn Model" class="h-11 w-full rounded-lg border border-gray-200 bg-white px-3 text-sm shadow-inner focus:border-indigo-300 focus:ring-2 focus:ring-indigo-100 focus:outline-none" /></div>
            </div>
            <div class="flex flex-col gap-1 sm:flex-row sm:items-start sm:gap-4">
              <div class="sm:w-32 sm:pt-2"><label class="text-sm font-medium text-gray-700"><span class="text-red-500">*</span> Category</label></div>
              <div class="flex-1"><select class="h-11 w-full rounded-lg border border-gray-200 bg-white px-3 text-sm text-gray-900 shadow-inner"><option selected>Gen AI</option></select></div>
            </div>
            <div class="flex flex-col gap-1 sm:flex-row sm:items-start sm:gap-4">
              <div class="sm:w-32 sm:pt-2"><label class="text-sm font-medium text-gray-700"><span class="text-red-500">*</span> Status</label></div>
              <div class="flex-1"><select class="h-11 w-full rounded-lg border border-gray-200 bg-white px-3 text-sm text-gray-900 shadow-inner"><option selected>In use</option></select></div>
            </div>
            <div class="flex flex-col gap-1 sm:flex-row sm:items-start sm:gap-4">
              <div class="sm:w-32 sm:pt-2"><label class="text-sm font-medium text-gray-700">Description</label></div>
              <div class="flex-1"><textarea rows="3" class="w-full rounded-lg border border-gray-200 bg-white px-3 py-2 text-sm shadow-inner">Predicts churn risk per customer from behavioural and billing signals.</textarea></div>
            </div>
            <div class="flex items-center gap-3 sm:gap-4">
              <div class="hidden sm:block sm:w-32"></div>
              <div class="flex flex-1 items-center gap-2">
                <input type="checkbox" checked class="h-4 w-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500" />
                <label class="text-sm font-medium text-gray-700">Active</label>
              </div>
            </div>
          </div>
          <div class="flex items-center justify-end gap-3 border-t border-gray-100 px-5 py-3">
            <button type="button" class="rounded-lg px-4 py-2 text-sm font-semibold text-gray-600 hover:bg-gray-100">Cancel</button>
            <button type="button" class="rounded-lg bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-700">Save changes</button>
          </div>
        </form>
      </div>
    </div>

    <!-- MOBILE (375px) -->
    <div>
      <div class="mb-2 inline-flex rounded-full bg-indigo-50 px-3 py-1 text-xs font-semibold text-indigo-700">Create · mobile 375</div>
      <div class="w-[375px] rounded-2xl border border-gray-200 bg-white shadow-2xl">
        <form class="flex w-full flex-col">
          <div class="flex items-center justify-between border-b border-gray-100 px-5 py-4">
            <h2 class="text-lg font-semibold text-gray-900">New Asset</h2>
            <button type="button" class="p-1 text-gray-400">✕</button>
          </div>
          <div class="flex-1 space-y-4 px-5 py-4">
            <div class="flex flex-col gap-1"><label class="text-sm font-medium text-gray-700"><span class="text-red-500">*</span> Name</label><input type="text" placeholder="Asset name" class="h-11 w-full rounded-lg border border-gray-200 bg-white px-3 text-sm shadow-inner" /></div>
            <div class="flex flex-col gap-1"><label class="text-sm font-medium text-gray-700"><span class="text-red-500">*</span> Category</label><select class="h-11 w-full rounded-lg border border-gray-200 bg-white px-3 text-sm text-gray-500 shadow-inner"><option>— select —</option></select></div>
            <div class="flex flex-col gap-1"><label class="text-sm font-medium text-gray-700">Description</label><textarea rows="3" placeholder="Short description" class="w-full rounded-lg border border-gray-200 bg-white px-3 py-2 text-sm shadow-inner"></textarea></div>
            <div class="flex items-center gap-2"><input type="checkbox" checked class="h-4 w-4 rounded border-gray-300 text-indigo-600" /><label class="text-sm font-medium text-gray-700">Active</label></div>
          </div>
          <div class="flex items-center justify-end gap-3 border-t border-gray-100 px-5 py-3">
            <button type="button" class="rounded-lg px-4 py-2 text-sm font-semibold text-gray-600">Cancel</button>
            <button type="button" class="rounded-lg bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm">Save</button>
          </div>
        </form>
      </div>
    </div>

  </div>
</body>
</html>
