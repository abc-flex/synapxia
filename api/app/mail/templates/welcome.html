<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        h1 { color: #0066cc; }
        .footer { font-size: 12px; color: #999; margin-top: 30px; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to SynapxIA!</h1>
        <p>Hi {{ user.first_name }},</p>
        <p>Your account has been successfully created. You can now log in with your credentials.</p>
        <p><strong>Username:</strong> {{ user.username }}<br>
           <strong>Email:</strong> {{ user.email }}</p>
        <p>If you have any questions, please contact us.</p>
        <div class="footer">
            <p>&copy; 2026 SynapxIA. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
